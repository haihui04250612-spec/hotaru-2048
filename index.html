<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>萤火虫2048</title>

<style>
body{
  margin:0;
  min-height:100vh;
  position:relative;
  background:
    radial-gradient(circle at 20% 20%, rgba(246,216,120,.12), transparent 25%),
    radial-gradient(circle at 80% 30%, rgba(120,180,255,.10), transparent 28%),
    linear-gradient(180deg,#050814 0%,#0b1020 55%,#111a2f 100%);
  color:white;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  text-align:center;
  overflow:hidden;
}

#stars{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  background:
    radial-gradient(circle at 20% 25%, rgba(255,255,255,.8) 1px, transparent 2px),
    radial-gradient(circle at 70% 15%, rgba(255,255,255,.7) 1px, transparent 2px),
    radial-gradient(circle at 80% 35%, rgba(255,255,255,.6) 1px, transparent 2px),
    radial-gradient(circle at 15% 70%, rgba(255,255,255,.7) 1px, transparent 2px),
    radial-gradient(circle at 60% 80%, rgba(255,255,255,.8) 1px, transparent 2px);
}

h1{
  position:relative;
  z-index:2;
  margin-top:30px;
  color:#f6d878;
  text-shadow:0 0 14px rgba(246,216,120,.45);
}

#score{
  position:relative;
  z-index:2;
  margin:10px;
  font-size:18px;
}

#board{
  position:relative;
  z-index:2;
  width:320px;
  height:320px;
  margin:20px auto;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  grid-template-rows:repeat(4,1fr);
  gap:8px;
  touch-action:none;
  user-select:none;
}

.cell{
  background:#24365e;
  border-radius:12px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-size:20px;
  min-width:0;
  min-height:0;
  overflow:hidden;
  box-sizing:border-box;
  transition:background .2s,color .2s;
  box-shadow:
    0 0 10px rgba(255,255,255,.05),
    0 0 20px rgba(246,216,120,.06);
  backdrop-filter:blur(2px);
}

.small{
  font-size:11px;
  opacity:.8;
  margin-top:4px;
  max-width:100%;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

button{
  position:relative;
  z-index:2;
  padding:10px 18px;
  border:none;
  border-radius:12px;
  background:#f6d878;
  color:#0b1020;
  font-weight:bold;
  box-shadow:
    0 0 12px rgba(246,216,120,.35),
    0 0 25px rgba(246,216,120,.18);
}

.cell.new{
  animation: pop .18s ease-out;
}

.cell.merged{
  animation: merge .22s ease-out;
}

@keyframes pop{
  0%{transform:scale(.4);opacity:0;}
  100%{transform:scale(1);opacity:1;}
}

@keyframes merge{
  0%{transform:scale(1);}
  50%{transform:scale(1.18);}
  100%{transform:scale(1);}
}
</style>
</head>

<body>
<div id="stars"></div>

<h1>🌌 萤火虫2048</h1>
<div id="score">Score: 0</div>
<div id="board"></div>
<button onclick="start()">重新开始</button>

<script>
const labels={
  2:"🪲萤",4:"✨微光",8:"⭐星尘",16:"🌙月色",
  32:"🎐风铃",64:"🌃夏夜",128:"📞电话",256:"📖日记",
  512:"💭想念",1024:"🌌小由已上线",2048:"💙愿妳平安而幸福"
};

let grid,score,startX,startY;
let newCell=null;
let mergedCells=[];

function start(){
  grid=Array.from({length:4},()=>Array(4).fill(0));
  score=0;
  add();
  add();
  draw();
}

function add(){
  let empty=[];
  for(let r=0;r<4;r++){
    for(let c=0;c<4;c++){
      if(!grid[r][c]) empty.push([r,c]);
    }
  }
  if(!empty.length)return;

  let [r,c]=empty[Math.floor(Math.random()*empty.length)];
  grid[r][c]=Math.random()<0.9?2:4;
  newCell=[r,c];
}

function draw(){
  document.getElementById("score").textContent="Score: "+score;
  board.innerHTML="";

  grid.forEach((row,r)=>{
    row.forEach((n,c)=>{
      let d=document.createElement("div");
      d.className="cell";

      if(newCell && newCell[0]===r && newCell[1]===c){
        d.classList.add("new");
      }

      if(mergedCells.some(pos=>pos[0]===r && pos[1]===c)){
        d.classList.add("merged");
      }

      d.innerHTML=n?`<div>${n}</div><div class="small">${labels[n]||""}</div>`:"";

      if(n===2)d.style.background="#284b3f";

if(n===4)d.style.background="#315a7d";

if(n===8)d.style.background="#3f5d8a";

if(n===16)d.style.background="#5965a5";

if(n===32)d.style.background="#8070b8";

if(n===64)d.style.background="#c08a4a";

if(n===128)d.style.background="#d8a94f";

if(n===256)d.style.background="#e5bf63";

if(n===512)d.style.background="#f0d878";

if(n===1024)d.style.background="#ffe48a";

if(n>=2048){
  d.style.background="#fff2b0";
  d.style.color="#111";
}

      board.appendChild(d);
    });
  });

  newCell=null;
  mergedCells=[];
}

function slide(row,lineIndex=null,dir=null){
  row=row.filter(n=>n);

  for(let i=0;i<row.length-1;i++){
    if(row[i]===row[i+1]){
      row[i]*=2;
      score+=row[i];

      if(dir==="left") mergedCells.push([lineIndex,i]);
      if(dir==="right") mergedCells.push([lineIndex,3-i]);
      if(dir==="up") mergedCells.push([i,lineIndex]);
      if(dir==="down") mergedCells.push([3-i,lineIndex]);

      if(row[i]===1024)alert("🌌 小由已上线");
      if(row[i]===2048)alert("愿妳平安而幸福");

      row.splice(i+1,1);
    }
  }

  while(row.length<4)row.push(0);
  return row;
}

function move(dir){
  let old=JSON.stringify(grid);
  mergedCells=[];

  if(dir==="left"){
    grid=grid.map((row,r)=>slide(row,r,"left"));
  }

  if(dir==="right"){
    grid=grid.map((row,r)=>slide(row.reverse(),r,"right").reverse());
  }

  if(dir==="up"){
    for(let c=0;c<4;c++){
      let col=slide(grid.map(r=>r[c]),c,"up");
      for(let r=0;r<4;r++)grid[r][c]=col[r];
    }
  }

  if(dir==="down"){
    for(let c=0;c<4;c++){
      let col=slide(grid.map(r=>r[c]).reverse(),c,"down").reverse();
      for(let r=0;r<4;r++)grid[r][c]=col[r];
    }
  }

  if(JSON.stringify(grid)!==old){
    add();
    draw();
  }
}

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft")move("left");
  if(e.key==="ArrowRight")move("right");
  if(e.key==="ArrowUp")move("up");
  if(e.key==="ArrowDown")move("down");
});

board.addEventListener("touchstart",e=>{
  startX=e.touches[0].clientX;
  startY=e.touches[0].clientY;
});

board.addEventListener("touchmove",e=>{
  e.preventDefault();
},{passive:false});

board.addEventListener("touchend",e=>{
  let dx=e.changedTouches[0].clientX-startX;
  let dy=e.changedTouches[0].clientY-startY;
  if(Math.abs(dx)>Math.abs(dy)) move(dx>0?"right":"left");
  else move(dy>0?"down":"up");
});

start();
</script>
</body>
</html>
