<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>给小由的萤火虫</title>

<style>
body{
  margin:0;
  min-height:100vh;
  position:relative;
  background:
    radial-gradient(circle at 20% 20%, rgba(246,216,120,.12), transparent 25%),
    radial-gradient(circle at 80% 30%, rgba(120,180,255,.10), transparent 28%),
    linear-gradient(180deg,#050814 0%,#0b1020 55%,#111a2f 100%);
  color:white;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  text-align:center;
  overflow:hidden;
}

#stars{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  background:
    radial-gradient(circle at 20% 25%, rgba(255,255,255,.8) 1px, transparent 2px),
    radial-gradient(circle at 70% 15%, rgba(255,255,255,.7) 1px, transparent 2px),
    radial-gradient(circle at 80% 35%, rgba(255,255,255,.6) 1px, transparent 2px),
    radial-gradient(circle at 15% 70%, rgba(255,255,255,.7) 1px, transparent 2px),
    radial-gradient(circle at 60% 80%, rgba(255,255,255,.8) 1px, transparent 2px);
}

h1{
  position:relative;
  z-index:2;
  margin-top:30px;
  color:#f6d878;
  text-shadow:0 0 14px rgba(246,216,120,.45);
}

#score{
  position:relative;
  z-index:2;
  margin:10px;
  font-size:18px;
}

#board{
  position:relative;
  z-index:2;
  width:320px;
  height:320px;
  margin:20px auto;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  grid-template-rows:repeat(4,1fr);
  gap:8px;
  touch-action:none;
  user-select:none;
}

.cell{
  background:#24365e;
  border-radius:12px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-size:20px;
  min-width:0;
  min-height:0;
  overflow:hidden;
  box-sizing:border-box;
  transition:background .2s,color .2s;
  box-shadow:
    0 0 10px rgba(255,255,255,.05),
    0 0 20px rgba(246,216,120,.06);
  backdrop-filter:blur(2px);
}

.small{
  font-size:9px;
  opacity:.8;
  margin-top:4px;
  max-width:100%;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.controls{
  position:relative;
  z-index:2;
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}

button{
  padding:10px 18px;
  border:none;
  border-radius:12px;
  background:#f6d878;
  color:#0b1020;
  font-weight:bold;
  box-shadow:
    0 0 12px rgba(246,216,120,.35),
    0 0 25px rgba(246,216,120,.18);
}

.cell.new{
  animation: pop .18s ease-out;
}

.cell.merged{
  animation: merge .22s ease-out;
}

@keyframes pop{
  0%{transform:scale(.4);opacity:0;}
  100%{transform:scale(1);opacity:1;}
}

@keyframes merge{
  0%{transform:scale(1);}
  50%{transform:scale(1.18);}
  100%{transform:scale(1);}
}

.firefly{
  position:fixed;
  width:6px;
  height:6px;
  border-radius:50%;
  background:#f6d878;
  box-shadow:
    0 0 8px #f6d878,
    0 0 16px #f6d878;
  pointer-events:none;
  z-index:5;
  animation: fly .8s ease-out forwards;
}

@keyframes fly{
  0%{transform:translate(0,0) scale(.6);opacity:1;}
  100%{transform:translate(var(--x),var(--y)) scale(0);opacity:0;}
}

.firefly-bg{
  position:fixed;
  width:8px;
  height:8px;
  border-radius:50%;
  background:#f6d878;
  box-shadow:
    0 0 10px #f6d878,
    0 0 20px #f6d878;
  opacity:.8;
  pointer-events:none;
  z-index:1;
  animation:
    floatFirefly 12s linear infinite,
    blinkFirefly 2s ease-in-out infinite;
}

@keyframes floatFirefly{
  0%{transform:translate(0,0);}
  50%{transform:translate(30px,-60px);}
  100%{transform:translate(0,0);}
}

@keyframes blinkFirefly{
  0%,100%{opacity:.25;}
  50%{opacity:1;}
}

#letterOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

#letterPaper{
  width:min(90vw,500px);
  max-height:80vh;
  overflow-y:auto;
  background:linear-gradient(180deg,#fff9ea,#f7edd2);
  color:#3d3120;
  border-radius:20px;
  padding:28px;
  text-align:left;
  line-height:1.8;
  box-shadow:0 0 40px rgba(246,216,120,.5);
  animation:paperAppear .5s ease;
}

.letterTitle{
  text-align:center;
  font-size:24px;
  font-weight:bold;
  margin-bottom:20px;
}

#letterContent{
  white-space:pre-line;
  font-size:15px;
}

#letterPaper button{
  display:block;
  margin:22px auto 0;
}

@keyframes paperAppear{
  from{
    transform:translateY(30px);
    opacity:0;
  }
  to{
    transform:translateY(0);
    opacity:1;
  }
}
</style>
</head>

<body>

<audio id="bgm" src="music.mp3" loop></audio>

<div id="stars"></div>

<div class="firefly-bg" style="left:10%;top:80%;"></div>
<div class="firefly-bg" style="left:25%;top:60%;"></div>
<div class="firefly-bg" style="left:70%;top:75%;"></div>
<div class="firefly-bg" style="left:85%;top:40%;"></div>
<div class="firefly-bg" style="left:55%;top:85%;"></div>
<div class="firefly-bg" style="left:35%;top:25%;"></div>
<div class="firefly-bg" style="left:75%;top:20%;"></div>
<div class="firefly-bg" style="left:15%;top:45%;"></div>

<h1 id="title">🌌 萤火虫2048</h1>
<div id="score">Score: 0</div>
<div id="board"></div>

<div class="controls">
  <button onclick="start(true)">重新开始</button>
  <button onclick="undoMove()">↩️ 撤回一步</button>
  <button onclick="toggleMusic()" id="musicBtn">🔊 开音乐</button>
</div>

<div id="letterOverlay">
  <div id="letterPaper">
    <div class="letterTitle">给小由</div>
    <div id="letterContent"></div>
    <button onclick="closeLetter()">💙 收起信纸</button>
  </div>
</div>

<script>
const labels={
  2:"🪲萤",
  4:"✨微光",
  8:"⭐星尘",
  16:"🌙月色",
  32:"🎐风铃",
  64:"🌃夏夜",
  128:"📞电话",
  256:"📖日记",
  512:"💭想念",
  1024:"🌌小由已上线",
  2048:"💙愿妳平安而幸福",
  4096:"🫧我一直在",
  8192:"🌌其实这不是2048，是一封信",
  16384:"💌给小由的信",
32768:"✨谢谢妳来到我的生命里",
65536:"🌙谢谢妳是妳",
131072:"🫧故事还没有结束",
262144:"🌌下一次见",
524288:"💙永远太远了，那就见面吧"

const board=document.getElementById("board");
const bgm=document.getElementById("bgm");
const musicBtn=document.getElementById("musicBtn");

let grid,score,startX,startY;
let previousGrid=null;
let previousScore=0;
let bestScore=Number(localStorage.getItem("bestScore"))||0;
let newCell=null;
let mergedCells=[];
let musicPlaying=false;
let audioCtx=null;
let noteIndex=0;

const melody=[
  523.25,587.33,659.25,783.99,
  659.25,587.33,523.25,392.00,
  440.00,523.25,587.33,659.25,
  783.99,659.25,587.33,523.25
];

function showLetter(){
  document.getElementById("letterContent").innerText=
`给小由：

如果妳看到这里，
说明妳已经陪这些萤火虫走了很远很远。

其实这从来不只是2048。

那些数字，
那些弹窗，
那些会飞起来的萤火虫，
都是我想慢慢递给妳的话。

2048没有真正通关之日，我也会一直爱着妳。

因为喜欢妳这件事，本来就不是为了抵达终点。

而是在每一个平凡的明天里，依然想与妳相拥、牵着手看着对方的眼睛，看见———

彼此。

谢谢妳来到我的生命里。
谢谢妳愿意理解我、陪伴我、爱我。

我希望妳平安、自由、无憾。
也希望妳在难过的时候记得：

我一直在。
我一直爱妳。

——卉卉`;

  document.getElementById("letterOverlay").style.display="flex";
}

function closeLetter(){
  document.getElementById("letterOverlay").style.display="none";
}

function saveGame(){
  localStorage.setItem(
    "firefly2048save",
    JSON.stringify({
      grid:grid,
      score:score,
      previousGrid:previousGrid,
      previousScore:previousScore
    })
  );
}

function loadGame(){
  const save=localStorage.getItem("firefly2048save");
  if(!save) return false;

  const data=JSON.parse(save);
  grid=data.grid;
  score=data.score;
  previousGrid=data.previousGrid||null;
  previousScore=data.previousScore||0;

  return true;
}

function initSound(){
  if(!audioCtx){
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  }

  if(audioCtx.state==="suspended"){
    audioCtx.resume();
  }
}

function playNote(){
  if(!audioCtx) return;

  const freq=melody[noteIndex % melody.length];
  noteIndex++;

  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();

  osc.type="sine";
  osc.frequency.value=freq;

  gain.gain.setValueAtTime(0.001,audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.06,audioCtx.currentTime+0.01);
  gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.22);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime+0.23);
}

async function toggleMusic(){
  initSound();

  if(musicPlaying){
    bgm.pause();
    musicPlaying=false;
    musicBtn.textContent="🔊 开音乐";
  }else{
    try{
      bgm.volume=0.25;
      await bgm.play();
      musicPlaying=true;
      musicBtn.textContent="🔇 关音乐";
    }catch(e){
      alert("音乐播放失败，请再点一次按钮");
    }
  }
}

function start(newGame=false){
  if(newGame){
    localStorage.removeItem("firefly2048save");
    newCell=null;
    mergedCells=[];
    previousGrid=null;
    previousScore=0;
  }

  if(!newGame && loadGame()){
    draw();
    return;
  }

  grid=Array.from({length:4},()=>Array(4).fill(0));
  score=0;
  newCell=null;
  mergedCells=[];

  add();
  add();
  draw();
  saveGame();
}

function add(){
  let empty=[];

  for(let r=0;r<4;r++){
    for(let c=0;c<4;c++){
      if(!grid[r][c]) empty.push([r,c]);
    }
  }

  if(!empty.length)return;

  let [r,c]=empty[Math.floor(Math.random()*empty.length)];
  grid[r][c]=Math.random()<0.9?2:4;
  newCell=[r,c];
}

function draw(){
  document.getElementById("score").innerHTML=
    "Score: "+score+"<br>Best: "+bestScore;

  board.innerHTML="";

  grid.forEach((row,r)=>{
    row.forEach((n,c)=>{
      let d=document.createElement("div");
      d.className="cell";

      if(newCell && newCell[0]===r && newCell[1]===c){
        d.classList.add("new");
      }

      if(mergedCells.some(pos=>pos[0]===r && pos[1]===c)){
        d.classList.add("merged");
      }

      d.innerHTML=n?`<div>${n}</div><div class="small">${labels[n]||""}</div>`:"";

      if(n===2){
        d.style.background="#284b3f";
        d.style.boxShadow="0 0 12px rgba(95,255,180,.25)";
      }
      if(n===4){
        d.style.background="#315a7d";
        d.style.boxShadow="0 0 14px rgba(120,200,255,.25)";
      }
      if(n===8){
        d.style.background="#3f5d8a";
        d.style.boxShadow="0 0 16px rgba(180,210,255,.28)";
      }
      if(n===16){
        d.style.background="#5965a5";
        d.style.boxShadow="0 0 18px rgba(220,220,255,.3)";
      }
      if(n===32){
        d.style.background="#8070b8";
        d.style.boxShadow="0 0 20px rgba(210,180,255,.32)";
      }
      if(n===64){
        d.style.background="#c08a4a";
        d.style.boxShadow="0 0 22px rgba(255,190,100,.35)";
      }
      if(n===128){
        d.style.background="#d8a94f";
        d.style.boxShadow="0 0 24px rgba(255,210,120,.4)";
      }
      if(n===256){
        d.style.background="#e5bf63";
        d.style.boxShadow="0 0 26px rgba(255,225,140,.45)";
      }
      if(n===512){
        d.style.background="#f0d878";
        d.style.color="#111";
        d.style.boxShadow="0 0 30px rgba(255,235,160,.55)";
      }
      if(n===1024){
        d.style.background="#ffe48a";
        d.style.color="#111";
        d.style.boxShadow="0 0 36px rgba(255,235,150,.7)";
      }
      if(n>=2048){
        d.style.background="#fff2b0";
        d.style.color="#111";
        d.style.boxShadow="0 0 45px rgba(255,245,180,.9)";
      }

      board.appendChild(d);
    });
  });

  newCell=null;
  mergedCells=[];
}

function createFireflies(){
  const rect=board.getBoundingClientRect();

  for(let i=0;i<8;i++){
    const f=document.createElement("div");
    f.className="firefly";

    f.style.left=(rect.left+rect.width/2)+"px";
    f.style.top=(rect.top+rect.height/2)+"px";

    f.style.setProperty("--x",(Math.random()*160-80)+"px");
    f.style.setProperty("--y",(Math.random()*-160-40)+"px");

    document.body.appendChild(f);

    setTimeout(()=>{
      f.remove();
    },800);
  }
}

function showMilestone(n){
  if(n===1024){
    alert("🌌 小由已上线");
  }

  if(n===2048){
    alert("💙 愿妳平安而幸福");
  }

  if(n===4096){
    alert("🫧 我一直在");
  }

  if(n===8192){
    alert(
`🌌

其实这不是2048。

是一封信。`
    );
  }

  if(n===16384){
    showLetter();
  }
  if(n===32768){
  alert(
`✨

谢谢妳来到我的生命里。`
  );
}

if(n===65536){
  alert(
`🌙

谢谢妳是妳。`
  );
}

if(n===131072){
  alert(
`🫧

故事还没有结束。`
  );
}

if(n===262144){
  alert(
`🌌

下一次见。`
  );
}

if(n===524288){
  alert(
`💙

永远太远了，那就见面吧。`
  );
}
}

function slide(row,lineIndex=null,dir=null){
  row=row.filter(n=>n);

  for(let i=0;i<row.length-1;i++){
    if(row[i]===row[i+1]){
      row[i]*=2;
      score+=row[i];
      createFireflies();
      showMilestone(row[i]);

      if(dir==="left") mergedCells.push([lineIndex,i]);
      if(dir==="right") mergedCells.push([lineIndex,3-i]);
      if(dir==="up") mergedCells.push([i,lineIndex]);
      if(dir==="down") mergedCells.push([3-i,lineIndex]);

      row.splice(i+1,1);
    }
  }

  while(row.length<4)row.push(0);
  return row;
}

function move(dir){
  initSound();

  let oldGrid=JSON.parse(JSON.stringify(grid));
  let oldScore=score;
  let old=JSON.stringify(grid);

  mergedCells=[];

  if(dir==="left"){
    grid=grid.map((row,r)=>slide(row,r,"left"));
  }

  if(dir==="right"){
    grid=grid.map((row,r)=>slide(row.reverse(),r,"right").reverse());
  }

  if(dir==="up"){
    for(let c=0;c<4;c++){
      let col=slide(grid.map(r=>r[c]),c,"up");
      for(let r=0;r<4;r++)grid[r][c]=col[r];
    }
  }

  if(dir==="down"){
    for(let c=0;c<4;c++){
      let col=slide(grid.map(r=>r[c]).reverse(),c,"down").reverse();
      for(let r=0;r<4;r++)grid[r][c]=col[r];
    }
  }

  if(JSON.stringify(grid)!==old){
    previousGrid=oldGrid;
    previousScore=oldScore;

    if(score>bestScore){
      bestScore=score;
      localStorage.setItem("bestScore",bestScore);
    }

    playNote();
    add();
    draw();
    saveGame();
  }
}

function undoMove(){
  if(!previousGrid){
    alert("没有可以撤回的步骤了");
    return;
  }

  grid=JSON.parse(JSON.stringify(previousGrid));
  score=previousScore;

  previousGrid=null;
  previousScore=0;

  draw();
  saveGame();
}

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft")move("left");
  if(e.key==="ArrowRight")move("right");
  if(e.key==="ArrowUp")move("up");
  if(e.key==="ArrowDown")move("down");
});

board.addEventListener("touchstart",e=>{
  startX=e.touches[0].clientX;
  startY=e.touches[0].clientY;
});

board.addEventListener("touchmove",e=>{
  e.preventDefault();
},{passive:false});

board.addEventListener("touchend",e=>{
  let dx=e.changedTouches[0].clientX-startX;
  let dy=e.changedTouches[0].clientY-startY;

  if(Math.abs(dx)<20 && Math.abs(dy)<20)return;

  if(Math.abs(dx)>Math.abs(dy)){
    move(dx>0?"right":"left");
  }else{
    move(dy>0?"down":"up");
  }
});

let titleClickCount=0;

document.getElementById("title").addEventListener("click",()=>{
  titleClickCount++;

  if(titleClickCount>=5){
    alert(
`🌌 小由已上线

其实一直都在。`
    );

    titleClickCount=0;
  }
});

window.addEventListener("beforeunload",()=>{
  saveGame();
});

start();
</script>
</body>
</html>
